name: Bug Report (Platform / Infrastructure)
description: Report a bug in the Wikimedica platform or infrastructure
title: "[Bug] "
labels:
  - bug
  - triage

body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - MediaWiki (application)
        - Traefik (reverse proxy)
        - MariaDB (database)
        - GitHub Actions (CI/CD)
        - PubMed surveillance pipeline
        - Metadata validation
        - Deployment scripts
        - DNS / TLS / Cloudflare
        - Content (broken links, rendering issues)
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (site down / data loss)
        - High (major functionality broken)
        - Medium (degraded functionality)
        - Low (cosmetic / minor)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click / run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Messages
      description: Paste relevant log output here (sanitise any sensitive data)
      render: text
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Production / Staging / Local dev"
    validations:
      required: true
