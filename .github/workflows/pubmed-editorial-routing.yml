name: PubMed Editorial Routing

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read
  issues: write

jobs:
  route-pubmed-content:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Route PubMed editorial decision
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Processing PR #${PR_NUMBER}: ${PR_TITLE}"

          NEWSLETTER=false
          WHATSAPP=false
          ARCHIVE=false
          REVIEW_LATER=false

          echo "$PR_BODY" | grep -qiE '^- \[[xX]\] Newsletter' && NEWSLETTER=true
          echo "$PR_BODY" | grep -qiE '^- \[[xX]\] WhatsApp Kanal' && WHATSAPP=true
          echo "$PR_BODY" | grep -qiE '^- \[[xX]\] Nur Archiv' && ARCHIVE=true
          echo "$PR_BODY" | grep -qiE '^- \[[xX]\] Wiedervorlage' && REVIEW_LATER=true

          if ! $NEWSLETTER && ! $WHATSAPP && ! $ARCHIVE && ! $REVIEW_LATER; then
            gh pr comment "$PR_NUMBER" --body "⚠️ Keine Entscheidung ausgewählt."
            exit 1
          fi

          if $REVIEW_LATER && ($NEWSLETTER || $WHATSAPP || $ARCHIVE); then
            gh pr comment "$PR_NUMBER" --body "⚠️ Wiedervorlage darf nicht mit anderen Optionen kombiniert werden."
            exit 1
          fi

          if $ARCHIVE && ($NEWSLETTER || $WHATSAPP); then
            gh pr comment "$PR_NUMBER" --body "⚠️ 'Nur Archiv' darf nicht mit Veröffentlichungen kombiniert werden."
            exit 1
          fi

          mkdir -p data/pubmed/archive data/pubmed/newsletter data/pubmed/whatsapp data/pubmed/review_later

          files=$(git diff --name-only HEAD^ HEAD | grep -E '^data/pubmed/(inbox|review|reviewed)/.*\.(json|jsonl|md|yml|yaml)$' || true)

          if [ -z "$files" ]; then
            gh pr comment "$PR_NUMBER" --body "ℹ️ Keine Dateien gefunden."
            exit 0
          fi

          echo "$files" | while read -r file; do
            base=$(basename "$file")

            specialty="misc"
            if grep -qiE 'specialty:|fachbereich:' "$file"; then
              specialty=$(grep -iE 'specialty:|fachbereich:' "$file" | head -n1 | cut -d ':' -f2 | tr -d ' "' | tr '[:upper:]' '[:lower:]')
            fi

            mkdir -p "data/pubmed/archive/$specialty"

            if $NEWSLETTER; then
              mkdir -p "data/pubmed/newsletter/$specialty"
              cp "$file" "data/pubmed/newsletter/$specialty/$base"
            fi

            if $WHATSAPP; then
              mkdir -p "data/pubmed/whatsapp/$specialty"
              cp "$file" "data/pubmed/whatsapp/$specialty/$base"
            fi

            if $REVIEW_LATER; then
              mkdir -p "data/pubmed/review_later/$specialty"
              git mv "$file" "data/pubmed/review_later/$specialty/$base" || mv "$file" "data/pubmed/review_later/$specialty/$base"
            else
              git mv "$file" "data/pubmed/archive/$specialty/$base" || mv "$file" "data/pubmed/archive/$specialty/$base"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Multi-target PubMed routing PR #${PR_NUMBER}" || echo "No changes"
          git push || true

          gh pr comment "$PR_NUMBER" --body "✅ Multi-Target Routing abgeschlossen (Newsletter=$NEWSLETTER, WhatsApp=$WHATSAPP, Archiv=$ARCHIVE, Wiedervorlage=$REVIEW_LATER)."
