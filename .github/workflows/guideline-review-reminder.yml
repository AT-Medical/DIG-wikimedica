name: Monthly Guideline Review Reminder

on:
  schedule:
    - cron: "0 8 1 * *"  # 1st of every month at 08:00 UTC
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  guideline-review:
    name: Generate monthly guideline review report
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate guideline review report
        id: report
        run: |
          set +e
          python scripts/reporting/monthly-guideline-report.py \
            --output /tmp/guideline-report.md
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "report_content<<EOF" >> "$GITHUB_OUTPUT"
          if [ -f /tmp/guideline-report.md ]; then
            cat /tmp/guideline-report.md >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"
        continue-on-error: false

      - name: Read report content
        id: read-report
        run: |
          REPORT=""
          if [ -f /tmp/guideline-report.md ]; then
            REPORT=$(cat /tmp/guideline-report.md)
          fi
          echo "content<<HEREDOC" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "HEREDOC" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue with report
        if: steps.report.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const report = ${{ toJSON(steps.report.outputs.report_content) }};
            const today = new Date().toISOString().slice(0, 7); // YYYY-MM

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Monthly] Guideline Review Report — ${today}`,
              body: report,
              labels: ['guideline-review', 'monthly-report', 'editorial'],
            });

            core.info('Guideline review issue created successfully.');
