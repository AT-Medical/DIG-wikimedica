name: Link Check

on:
  schedule:
    - cron: "0 4 * * 1"  # Every Monday at 04:00 UTC
  pull_request:
    paths:
      - "**/*.md"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

jobs:
  link-check:
    name: Check links in Markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --verbose
            --no-progress
            --accept 200,204,301,302,403
            --exclude "mailto:"
            --exclude "localhost"
            --exclude "wikimedica.de"
            --timeout 30
            --max-retries 3
            "**/*.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on link check failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Automated] Broken links detected',
              body: 'The weekly link check found broken links in the repository. ' +
                    'Please review the workflow run for details.\n\n' +
                    `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['link-check', 'maintenance']
            })
