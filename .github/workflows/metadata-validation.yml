name: Metadata Validation

on:
  push:
    paths:
      - "content/**/*.md"
  pull_request:
    paths:
      - "content/**/*.md"

jobs:
  validate-metadata:
    name: Validate article frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Get changed Markdown files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: "content/**/*.md"

      - name: Run metadata validation on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python scripts/validation/validate-metadata.py \
            ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run metadata validation on all content (scheduled)
        if: github.event_name == 'schedule'
        run: |
          python scripts/validation/validate-metadata.py content/
