name: Spelling Check

on:
  push:
    paths:
      - "**/*.md"
      - ".cspell.json"
  pull_request:
    paths:
      - "**/*.md"
      - ".cspell.json"

permissions:
  contents: read

jobs:
  spelling:
    name: Check spelling in Markdown files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cspell
        run: npm install -g cspell

      - name: Run spelling check
        run: |
          cspell \
            --config .cspell.json \
            --no-progress \
            --show-context \
            "**/*.md"
